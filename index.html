<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffb84d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>打磚塊</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main id="appRoot" class="app-shell">
    <section id="setupScreen" class="setup-screen" aria-label="遊戲設定">
      <header class="setup-hero">
        <div class="title-group">
          <p class="eyebrow">Mobile Breakout</p>
          <h1>打磚塊</h1>
          <p class="subtitle">先設定玩法，按下開始後轉成橫向全螢幕遊玩。</p>
        </div>
        <div class="setup-records" aria-label="目前紀錄">
          <p><span>最高分</span><strong id="setupBestScore">0</strong></p>
          <p><span>最高關</span><strong id="setupBestLevel">1</strong></p>
          <p><span>遊玩局數</span><strong id="setupGamesPlayed">0</strong></p>
        </div>
      </header>

      <section class="setup-panel" aria-label="主要設定">
        <div class="panel-heading">
          <h2>遊玩設定</h2>
          <p>手機建議橫向握持，拖曳畫布即可移動板子。</p>
        </div>

        <div class="quick-settings">
          <label>
            模式
            <select id="modeSelect">
              <option value="classic">經典模式</option>
              <option value="daily">每日挑戰</option>
            </select>
          </label>
          <label>
            難度
            <select id="difficultySelect">
              <option value="easy">休閒</option>
              <option value="normal">標準</option>
              <option value="hard">挑戰</option>
            </select>
          </label>
          <label>
            主題
            <select id="themeSelect">
              <option value="classic">經典立體</option>
              <option value="neon">霓虹</option>
              <option value="candy">糖果</option>
              <option value="stone">石磚</option>
            </select>
          </label>
        </div>

        <div class="setup-toggles" aria-label="聲音與震動">
          <label><input id="setupMusicToggle" type="checkbox"> 音樂</label>
          <label><input id="setupSfxToggle" type="checkbox"> 音效</label>
          <label><input id="setupHapticsToggle" type="checkbox"> 震動</label>
        </div>

        <div class="volume-settings" aria-label="音量設定">
          <label>
            <span>音樂音量 <strong id="setupMusicVolumeValue">100%</strong></span>
            <input id="setupMusicVolume" type="range" min="0" max="150" step="5" value="100">
          </label>
          <label>
            <span>音效音量 <strong id="setupSfxVolumeValue">100%</strong></span>
            <input id="setupSfxVolume" type="range" min="0" max="150" step="5" value="100">
          </label>
        </div>

        <div class="setup-actions">
          <button id="startBtn" type="button" class="primary-btn">開始遊玩</button>
          <button id="versionBtn" type="button" class="secondary-btn">版本資訊</button>
          <button id="updateBtn" type="button" class="secondary-btn" hidden>更新遊戲</button>
          <button id="installBtn" type="button" class="secondary-btn" hidden>安裝 APP</button>
        </div>
        <p id="installHint" class="install-hint" hidden></p>
      </section>

      <section class="dashboard-grid" aria-label="遊戲資訊">
        <article class="info-panel">
          <h2>寶物</h2>
          <div class="legend-list">
            <p><span class="legend-chip laser">GUN</span> 雷射</p>
            <p><span class="legend-chip expand">WIDE</span> 板子變長</p>
            <p><span class="legend-chip bigball">BIG</span> 球變大</p>
            <p><span class="legend-chip multiball">x2</span> 分裂球</p>
            <p><span class="legend-chip slow">SLOW</span> 球速變慢</p>
            <p><span class="legend-chip bomb">!</span> 爆破磚</p>
            <p><span class="legend-chip steel">S</span> 鋼鐵磚</p>
            <p><span class="legend-chip moving">↔</span> 移動磚</p>
          </div>
        </article>

        <article class="info-panel">
          <h2>本局紀錄</h2>
          <div class="compact-stats" id="runStats"></div>
        </article>

        <article class="info-panel">
          <h2>成就</h2>
          <div class="achievement-list" id="achievementList"></div>
        </article>
      </section>
    </section>

    <section id="gameScreen" class="game-screen" aria-label="打磚塊遊戲" hidden>
      <header class="game-hud">
        <div class="game-title">
          <h1>打磚塊</h1>
          <p id="modeLabel">經典模式 / 標準</p>
        </div>

        <div class="stats" aria-label="遊戲狀態">
          <p>分數 <span id="score">0</span></p>
          <p>最高 <span id="bestScore">0</span></p>
          <p>生命 <span id="lives">3</span></p>
          <p>關卡 <span id="level">1</span></p>
        </div>

        <div class="game-actions" aria-label="遊戲操作">
          <button id="toggleBtn" type="button" class="secondary-btn">暫停</button>
          <button id="fireBtn" type="button" class="secondary-btn">射擊</button>
          <button id="settingsBtn" type="button" class="secondary-btn">音效</button>
          <button id="backToSetupBtn" type="button" class="secondary-btn">設定</button>
        </div>
      </header>

      <section class="canvas-wrap">
        <canvas id="gameCanvas" width="900" height="560" aria-label="打磚塊遊戲畫面"></canvas>
        <div class="progress-wrap" aria-label="關卡進度">
          <div class="progress-track"><div id="levelProgress" class="progress-fill"></div></div>
          <span id="remainingBricks">剩餘 0</span>
        </div>

        <div class="overlay" id="overlay" aria-live="polite">
          <h2 id="overlayTitle">打磚塊</h2>
          <p id="overlayText">按開始遊玩進入橫向全螢幕。</p>
          <div class="overlay-stats" id="overlayStats" hidden></div>
          <div class="overlay-actions" id="overlayActions" hidden>
            <button id="resumeBtn" type="button">繼續</button>
            <button id="restartBtn" type="button">重新開始</button>
            <button id="quickRestartBtn" type="button">3 秒重開</button>
            <button id="backToSetupOverlayBtn" type="button" class="secondary-btn">回設定</button>
          </div>
          <div class="settings-menu" id="settingsMenu" hidden>
            <label><input id="musicToggle" type="checkbox"> 音樂</label>
            <label><input id="sfxToggle" type="checkbox"> 音效</label>
            <label><input id="hapticsToggle" type="checkbox"> 震動</label>
            <label class="volume-control">
              <span>音樂音量 <strong id="musicVolumeValue">100%</strong></span>
              <input id="musicVolume" type="range" min="0" max="150" step="5" value="100">
            </label>
            <label class="volume-control">
              <span>音效音量 <strong id="sfxVolumeValue">100%</strong></span>
              <input id="sfxVolume" type="range" min="0" max="150" step="5" value="100">
            </label>
          </div>
          <div class="version-panel" id="versionPanel" hidden></div>
        </div>

        <div id="rotatePrompt" class="rotate-prompt" hidden>
          <div>
            <h2>請將手機轉為橫向</h2>
            <p>橫向後會自動進入倒數，畫面會放大成全螢幕遊玩。</p>
          </div>
        </div>
      </section>

      <div class="control-stubs" aria-hidden="true">
        <button id="leftBtn" type="button">左移</button>
        <button id="rightBtn" type="button">右移</button>
      </div>
    </section>
  </main>

  <script src="game.js"></script>
</body>
</html>
