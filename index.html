<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#ffb84d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>打磚塊</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="game-shell">
    <header class="top-bar">
      <div class="title-group">
        <h1>打磚塊</h1>
        <p class="subtitle">手機、平板與電腦都能玩的彈球挑戰</p>
      </div>
      <div class="stats">
        <p>分數 <span id="score">0</span></p>
        <p>生命 <span id="lives">3</span></p>
        <p>關卡 <span id="level">1</span></p>
      </div>
    </header>

    <section class="utility-bar" aria-label="安裝與說明">
      <button id="installBtn" type="button" class="secondary-btn" hidden>安裝 APP</button>
      <p id="installHint" class="install-hint" hidden></p>
    </section>

    <section class="canvas-wrap">
      <canvas id="gameCanvas" width="900" height="560" aria-label="打磚塊遊戲畫面"></canvas>
      <div class="overlay" id="overlay" aria-live="polite">
        <h2 id="overlayTitle">打磚塊</h2>
        <p id="overlayText">按空白鍵或開始遊戲發射球。</p>
      </div>
    </section>

    <section class="touch-panel" aria-label="手機操作面板">
      <button id="leftBtn" type="button" class="touch-btn">左移</button>
      <button id="toggleBtn" type="button" class="touch-btn touch-btn-accent">開始 / 暫停</button>
      <button id="fireBtn" type="button" class="touch-btn">發射</button>
      <button id="rightBtn" type="button" class="touch-btn">右移</button>
    </section>

    <footer class="controls">
      <button id="startBtn" type="button">開始遊戲</button>
      <p>
        電腦：<kbd>A</kbd>/<kbd>D</kbd> 或 <kbd>←</kbd>/<kbd>→</kbd>
        <span class="sep">|</span>
        發射 / 暫停：<kbd>Space</kbd>
        <span class="sep">|</span>
        手機：拖曳畫布或使用下方按鍵，拿到 GUN 後可用 <kbd>J</kbd> / 點擊 / 觸控開火
      </p>
    </footer>
  </main>

  <script src="game.js"></script>
</body>
</html>
